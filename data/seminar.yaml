  - title: Software Architects Are Dead—Long Live the AI-Augmented Architect!
    from: 20260119T141500
    to: 20260119T150000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    videomeeting: https://syddanskuni.zoom.us/j/62541149009
    speaker: Davide Taibi (SDU Veijle)
    abstract: |-
      What if the future of software architecture doesn't need architects as we
      know them? As GenAI infiltrates every stage of the software development
      lifecycle, the traditional role of the architect—meticulously designing
      systems from requirements to deployment—is being unbundled, redefined,
      and partially outsourced to machines. And yet, the industry is far from
      ready. This keynote presents a bold vision of the AI-Augmented Architect:
      a hybrid thinker who doesn't write blueprints alone but designs with AI,
      using it not as a tool—but as a creative partner, a challenger, a
      simulator of trade-offs. Drawing from two cutting-edge empirical studies,
      including a multivocal review of GenAI in software architecture and a
      forward-looking survey of industry leaders, we'll confront hard truths: AI
      is already doing architectural documentation, detecting antipatterns, and
      even suggesting design alternatives. But it's also hallucinating, biasing
      decisions, and eroding accountability. If we don't rethink our roles,
      methods, and mindset, software architects risk becoming passive validators
      of AI output rather than strategic designers of complex systems. The good
      news? There is still time to adapt—but only if we embrace a future where
      architecture is not less human, but more profoundly human because of our
      collaboration with machines.
  - title: Three Papers from EuroUSEC
    from: 20251201T141500
    to: 20251201T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Judith Kankam-Boateng
    abstract: |-
      (1) Cybersecurity Insights Gleaned from World Religions by Karen Renaud
      and Marc Dupuis. Abstract: Despite security policies and training,
      employees continue to make mistakes that trigger cybersecurity incidents.
      This paper explores an unconventional source of insight: world religions,
      which have millennia of experience accommodating human frailties. We
      interviewed religious leaders and reviewed religious literature to develop
      a 'vision for cybersecurity' that was then evaluated by cybersecurity
      professionals. Our goal is to launch debate around more equitable best
      practices that better account for human nature.
      (2) "Even after two years, we still have a bad feeling": Two
      Comparative Case Studies of the Effects of a Cyberattack on Fear, Trust in
      the IT Department and Security-Related Stress by Markus Schöps, Sangavi
      Shanthakumar, and M. Angela Sasse. Abstract: Cyberattacks can have lasting
      psychological effects on employees and their relationship with IT
      departments. We studied two research organizations—one breached, one
      not—using questionnaires (n=149) and interviews with IT staff (n=8).
      Employees at the breached organization reported less trust in IT, worse
      communication, and more security-related stress. We found that stricter
      post-attack security measures, though well-intentioned, may paradoxically
      decrease employee trust and increase stress for everyone.
      (3) 'There was a bit of PTSD every time I walked through the office door':
      Ransomware harms and the factors that influence the victim
      organization's experience by Gareth Mott, Sarah Turner, Jason R.C.
      Nurse, et al. Abstract: Ransomware inflicts wide-ranging harms beyond
      financial losses. Through interviews and workshops with 83 professionals
      (including victims, responders, and law enforcement), we identify severe
      organizational impacts—business interruption, reputation damage—and
      under-reported employee harms including acute psychological and physical
      effects. We also identify factors that moderate these harms, such as
      preparedness and leadership culture. Our findings position ransomware as
      a whole-of-organization crisis, not merely an "IT problem."
  - title: '"Like Parsley in Greek Food:" Elementary Set Theory and the case for DM1'
    from: 20251117T141500
    to: 20251117T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Siddharth Bhaskar
    abstract: |-
      The predominant design philosophy behind most Discrete Mathematics (DM)
      courses is that of a recycling bin: a place where mathematical
      prerequisites with no other natural home can live out the rest of their
      days in peace. This fundamentally misunderstands the role of mathematics
      in computer science. Instead of being a collection of topical
      prerequisites, mathematics provides a conceptual framework enabling the
      sort of high-level computational thinking that a computer science
      bachelor's degree is supposed to train.
      I argue that the field of mathematics in question can be profitably
      identified with elementary set theory, roughly, the theory of (naive)
      sets and relations with structural induction. I propose an alternate model
      of mathematics education in the computer science degree: a `DM1' (and
      possibly DM2) course that receives as much importance as the CS1/2
      sequence and are similarly foregrounded in the program of study.
  - title: '"What we talk about when we talk about DAOs" + "Pathways to Performance: A Configurational Analysis of Consensus in DAOs"'
    from: 20251110T141500
    to: 20251110T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Giorgia Sampó
    abstract: |-
      "What we talk about when we talk about DAOs": Decentralized Autonomous
      Organizations (DAOs) integrate blockchain-based automation with novel
      forms of collective governance, yet research on them remains fragmented
      across technical and organizational silos, hindering a comprehensive
      understanding of DAOs as socio-technical systems. To bridge these gaps,
      we first conduct a systematic umbrella review of 12 prior surveys to map
      research themes and persistent gaps. Based on this analysis, we propose a
      novel, three-layer framework that explicitly links (i) technical artefacts
      (the infrastructure, e.g., tokens, smart contracts), (ii) governance
      logics (the rules, e.g., incentives, consensus mechanisms), and (iii)
      organizational manifestations (the outcomes, e.g., proposals, votes). By
      making cross-layer dependencies explicit, the framework enables more
      holistic theorizing, supports comparative empirical work, and provides a
      diagnostic tool for practitioners dealing with design trade-offs between
      decentralization, efficiency, and participation.
      "Pathways to Performance: A Configurational Analysis of Consensus in
      DAOs": Decentralized Autonomous Organizations (DAOs) represent a radical
      form of socio-technical systems, where rules are enforced by code and
      governance is conducted by a distributed network of stakeholders. A
      critical challenge in designing these systems is achieving consensus
      without centralized authority, yet how consensus ensures effective
      governance remains underexplored. This study investigates the design of
      DAO governance systems, utilizing data from 70 DAOs and applying Fuzzy Set
      Qualitative Comparative Analysis (fsQCA) to explore which consensus
      configurations lead to positive organizational outcomes. Our analysis
      challenges the notion of a single consensus model. Instead, we uncover 13
      distinct configurations that characterize successful DAOs. Our key finding
      reveals a fundamental “ideation/legitimation trade-off”: successful DAOs
      optimize for broad participation in either the proposal (ideation) stage
      or the voting (legitimation) stage, but rarely both. These insights
      provide a nuanced framework for understanding and designing effective
      governance systems for DAOs.
  - title: '"It’s Confusing, Insecure, and Messy" – Mapping the Gaps Between Stakeholders’ Cybersecurity Mental Model in the Danish Economy'
    from: 20251103T141500
    to: 20251103T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Judith Kankam-Boateng
    abstract: |-
      Small and medium-sized enterprises (SMEs) are facing growing cybersecurity
      threats amidst limited resources and regulatory complexity. This
      complexity stems from diverse stakeholders in the regulatory process,
      ranging from policy makers to industry associations to the companies
      having to implement the regulations. Misalignments between these
      different stakeholders can further compound the complexity. Against this
      backdrop, we investigate the cybersecurity mental models held by three
      stakeholder groups in Denmark’s defence sector and how they might
      influence regulatory processes. Using a qualitative approach that combines
      focus groups with 6 policymakers, 11 policy promoters (industry
      associations), and 12 policy implementers (SMEs), we reveal key
      misalignments in perceptions of risk, threats, cyber readiness, and policy
      interpretation. Our findings further show that SMEs often treat
      cybersecurity as a compliance task, while policy makers assume strategic
      readiness. From our results, we suggest recommendations for aligning
      governance frameworks with organisational realities.
  - title: "Cslib: a global open source effort to formalise all of computer science"
    from: 20251024T141500
    to: 20251024T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Fabrizio Montesi
    abstract: |-
      A few years ago, some researchers at SDU got interested in mechanizing a
      couple of things using the Rocq (née Coq) proof assistant. In the most
      outrageous example of scope creep of all time, Fabrizio is now trying to
      formalize every single thing anyone has ever said (now using Lean instead
      of Rocq). And for 45 minutes this Monday, he'll tell us about it!
  - title: "All you need is l̶o̶v̶e̶ controlled-V: universality of a standard two-qubit gate by catalytic embedding"
    from: 20251020T141500
    to: 20251020T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Robin Kaarsgaard Sales
    abstract: |-
      A central pursuit in quantum computing is to identify the minimal
      resources required to achieve universality. Within the quantum circuit
      model, this is studied by considering the gate sets that provide the
      fundamental instructions from which quantum algorithms are built. However,
      standard gate sets such as Clifford+T  contain some instructions that are
      disproportionately powerful, obscuring the precise source of quantum
      computational power. While single-gate universal sets are known, these
      rely on rotation angles that are irrational multiples of 2pi , requiring
      fine-tuned control that is difficult to achieve on quantum hardware today.
      Here, we show the surprising result that the controlled-V  (or
      controlled-sqrt(X)) gate, a simple two-qubit interaction previously
      described as "semi-classical" and already widely used in reversible logic
      synthesis and directly realisable on leading hardware platforms, suffices
      on its own to perform universal quantum computation. Our construction,
      based on catalytic embedding and a procedure to generate the necessary
      resource states, simulates standard universal gate sets with constant
      overhead, highlighting how the full power of quantum computation can
      emerge from unexpectedly simple ingredients.
  - title: '"It’s Confusing, Insecure, and Messy" – Mapping the Gaps Between Stakeholders’ Cybersecurity Mental Model in the Danish Economy'
