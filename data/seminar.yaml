  - title: Generic Reduction-Based Interpreters
    from: 20250929T141500
    to: 20250929T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Casper Bach
    abstract: |-
      Reduction-based interpreters are traditionally defined in terms of a
      one-step reduction function which systematically decomposes a term into a
      potential redex and context, contracts the redex, and recomposes it to
      construct the new term to be further reduced. While implementing such
      interpreters follows a systematic recipe, they often require interpreter
      engineers to write a substantial amount of code—much of it boilerplate. In
      this paper, we apply well-known techniques from generic programming to
      reduce boilerplate code in reduction-based interpreters.
  - title: The Stage Comparison theorem--a functional pearl?
    from: 20250922T141500
    to: 20250922T151000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Siddharth Bhaskar
    abstract: |-
      In any monotone inductive definition, we repeatedly add elements to a set
      until we achieve a fixed point. The stage of an element in the fixed point
      is the first ordinal where it appears in this process. A theory of
      monotone inductive definitions enjoys the stage comparison property in
      case the query comparing elements by their stages in a definable
      induction, is itself definable.
      The proof that positive elementary induction satisfies this property is
      basically a functional transforming the original induction into a
      definition of the corresponding stage comparison query. It is tricky and
      short application of higher-order reasoning. Sufficiently abstracted, I
      think it could qualify as a "functional pearl." I would like to present
      the theorem and see if you agree! My secret hope is to prove a plausible
      strengthening of this property that is natural and plausible but has
      baffled me for years.
  - title: Tempo Tutorial
    from: 20250915T141500
