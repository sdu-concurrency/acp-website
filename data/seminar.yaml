items:
  - title: Cyber Vulnerabilities and Resilience Capabilities
    from: 20260629T141500
    to: 20260629T150000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    videomeeting: https://meet.jit.si/moderated/e7ffd3f8264b87652b6af09cb47f5961227a025932867832828b34a172fd8f14
    speaker: Judith Kankam-Boateng
    abstract: |-
      Small and medium-sized enterprises (SMEs) in defence supply chains
      face growing cybersecurity threats but lack the resources to
      respond effectively. This paper examines the cybersecurity perceptions of
      three stakeholder groups in Denmark’s defence supply chain: policymakers
      (PM), policy promoters (PP), and policy implementers (PI). Through
      focus group discussions with 45 participants — 6 PMs, 11 PPs, and 28
      PIs (representatives from 12 SMEs) — we investigate how each group
      perceives cybersecurity and what organisational vulnerabilities and capabilities
      these perceptions reveal. Our analysis identifies 45 vulnerabilities
      across five categories, but only 17 capabilities, resulting in a pronounced
      imbalance at the SME level. Policymakers frame cybersecurity as a strate-
      gic national concern, SMEs experience it as a compliance burden, and
      policy promoters lack sufficient reach to bridge this gap. Applying a
      vulnerability–capability lens, we identify a capability translation problem.
      National-level assets, including centralised incident management and
      international partnerships, do not cascade to the SMEs they are designed
      to support. We offer differentiated recommendations for each stakeholder
      group and for designing targeted awareness programmes that account for
      divergent mental models across the supply chain.
  - title: Towards a Higher-Order Bialgebraic Denotational Semantics
    from: 20260622T141500
    to: 20260622T144500
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    speaker: Stefano Volpe
    abstract: |-
      (This talk is an encore of my 2026/03/09 presentation. This time, I will
      focus on the PL semantics side, and not assume familiarity with
      category theory nor coalgebras.)
      The bialgebraic abstract GSOS framework by Turi and Plotkin provides an
      elegant categorical approach to modelling the operational and denotational
      semantics of programming and process languages. In abstract GSOS,
      bisimilarity is always a congruence, and it coincides with denotational
      equivalence. This saves the language designer from intricate, ad-hoc
      reasoning to establish these properties. The bialgebraic perspective
      on operational semantics in the style of abstract GSOS has recently been
      extended to higher-order languages, preserving compositionality of
      bisimilarity. However, a categorical understanding of bialgebraic
      denotational semantics according to Turi and Plotkin’s original vision has
      so far been missing in the higher-order setting. In the present paper, we
      develop a theory of adequate denotational semantics in higher-order
      abstract GSOS. The denotational models are parametric in an appropriately
      chosen semantic domain in the form of a locally final coalgebra for a
      behaviour bifunctor, whose construction is fully decoupled from the syntax
      of the language. Our approach captures existing accounts of denotational
      semantics such as semantic domains built via general step-indexing,
      previously introduced on a per-language basis, and is shown to be
      applicable to a wide range of different higher-order languages, e.g.
      simply typed and untyped languages, or languages with computational
      effects such as probabilistic or non-deterministic branching.
  - title: Benchmarking API Data Transfer Refactorings to Service-Oriented Architectures
    from: 20260615T141500
    to: 20260615T150000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
    videomeeting: https://syddanskuni.zoom.us/j/62541149009
    speaker: Sandra Greiner
    abstract: |-
      Refactoring service-oriented software is crucial for competitiveness,
      security, and reliability. While the migration of monoliths to
      (micro-)services is well-studied, the evolution of a service-oriented
      architecture – particularly, the integration of API patterns – falls
      short, leaving practitioners with little knowledge on the impact of
      architectural refactorings. In this talk, we will use and study an
      existing framework for applying refactorings either internally in the
      refactored service(s), adjacently (in the same application but another
      service component), or externally in a remote service. I will show the
      results of studying the impact on performance as observed on the client
      side of these implementation variants. Lastly, I will outline research
      directions on how to extend and build on our work.
  - title: Locally Final Coalgebras in Denotational Semantics
    from: 20260309T141500
    to: 20260309T150000
    location: IMADA meeting room 4
    map: https://clients.mapsindoors.com/sdu/573f26e4bc1f571b08094312/details/aabc3bc3582f465fbd7614f3
